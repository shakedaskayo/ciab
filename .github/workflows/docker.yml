name: Docker Images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/docker.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: claude-sandbox
            context: images/claude-sandbox
            image: ghcr.io/shakedaskayo/ciab-claude
          - name: codex-sandbox
            context: images/codex-sandbox
            image: ghcr.io/shakedaskayo/ciab-codex
          - name: gemini-sandbox
            context: images/gemini-sandbox
            image: ghcr.io/shakedaskayo/ciab-gemini
          - name: cursor-sandbox
            context: images/cursor-sandbox
            image: ghcr.io/shakedaskayo/ciab-cursor

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
