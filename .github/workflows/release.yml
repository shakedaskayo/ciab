name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI binaries ────────────────────────────────────────────────────
  build-cli:
    name: CLI — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: ciab-darwin-arm64
          - name: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
            artifact: ciab-darwin-x64
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ciab-linux-x64
          - name: Linux (ARM64)
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ciab-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p ciab-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ciab dist/ciab
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ciab
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  # ── Desktop app (macOS DMG) ────────────────────────────────────────
  build-desktop:
    name: Desktop — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target universal-apple-darwin

      - name: Collect DMG artifacts
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/ 2>/dev/null || \
          cp desktop/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cd dist
          for f in *.dmg; do
            if command -v sha256sum &>/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ciab-desktop-macos
          path: dist/*

  # ── GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: CIAB ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
