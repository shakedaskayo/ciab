name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI binaries ────────────────────────────────────────────────────
  build-cli:
    name: CLI — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: ciab-darwin-arm64
          - name: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: ciab-darwin-x64
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ciab-linux-x64
          - name: Linux (ARM64)
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ciab-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p ciab-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ciab dist/ciab
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ciab
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  # ── Desktop app (macOS DMG) ────────────────────────────────────────
  build-desktop:
    name: Desktop — macOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target universal-apple-darwin

      - name: Collect DMG artifacts
        run: |
          mkdir -p dist
          # Tauri builds to different paths depending on target
          find . -name "*.dmg" -path "*/bundle/dmg/*" 2>/dev/null | head -5
          cp target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/ 2>/dev/null || \
          cp desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/ 2>/dev/null || \
          cp target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || \
          cp desktop/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          echo "Files in dist:"
          ls -la dist/ || true
          cd dist
          shopt -s nullglob
          dmg_files=(*.dmg)
          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "Warning: No DMG files found, skipping checksum"
            exit 0
          fi
          for f in "${dmg_files[@]}"; do
            if command -v sha256sum &>/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Check for DMG files
        id: dmg-check
        run: |
          if ls dist/*.dmg 1>/dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        if: steps.dmg-check.outputs.found == 'true'
        with:
          name: ciab-desktop-macos
          path: dist/*

  # ── Publish to crates.io ────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish() {
            local crate=$1
            echo "Publishing $crate..."
            local output
            # --no-verify: we already built/tested in CI
            if output=$(cargo publish -p "$crate" --no-verify 2>&1); then
              echo "$crate published successfully."
            elif echo "$output" | grep -q "already uploaded"; then
              echo "$crate already published at this version, skipping."
            else
              echo "$output"
              echo "Failed to publish $crate"
              exit 1
            fi
            # Give crates.io index time to update
            sleep 30
          }

          # Layer 1: no internal deps
          publish ciab-core

          # Layer 2: depends on ciab-core only
          publish ciab-db
          publish ciab-streaming
          publish ciab-sandbox
          publish ciab-sandbox-k8s
          publish ciab-sandbox-ec2
          publish ciab-agent-claude
          publish ciab-agent-codex
          publish ciab-agent-gemini
          publish ciab-agent-cursor
          publish ciab-packer

          # Layer 3: depends on ciab-core + ciab-db
          publish ciab-credentials
          publish ciab-gateway
          publish ciab-channels

          # Layer 4: depends on ciab-sandbox + ciab-credentials
          publish ciab-provisioning

          # Layer 5: depends on many internal crates
          publish ciab-api

          # Layer 6: facade crate
          publish ciab

          # Layer 7: CLI binary
          publish ciab-cli

  # ── GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-desktop, publish-crates]
    if: always() && needs.build-cli.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/ || echo "No artifacts directory"

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: CIAB ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
