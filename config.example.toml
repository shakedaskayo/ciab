[server]
host = "0.0.0.0"
port = 9090
workers = 4
request_timeout_secs = 300
cors_origins = ["*"]
# Serve the built web UI from this directory. Enables browser access via gateway URLs.
# Build with: cd desktop && npm run build
# web_ui_dir = "desktop/dist"

# --- Runtime ---
# CIAB supports multiple runtime backends:
#   "local"       — Run agents as local processes (no containers needed)
#   "docker"      — Run agents in Docker containers
#   "opensandbox" — Run agents in OpenSandbox containers
#   "kubernetes"  — Run agents as Kubernetes Pods

[runtime]
backend = "local"
# local_workdir = "/tmp/ciab-sandboxes"
# local_max_processes = 10

# For Docker backend:
# backend = "docker"
# docker_socket = "unix:///var/run/docker.sock"

# For OpenSandbox backend:
# backend = "opensandbox"
# opensandbox_url = "http://localhost:8000"
# opensandbox_api_key = "${OPENSANDBOX_API_KEY}"

# For Kubernetes backend:
# backend = "kubernetes"
#
# [runtime.kubernetes]
# namespace = "ciab-agents"              # Namespace for agent Pods
# agent_image = "ghcr.io/shakedaskayo/ciab-claude:latest"
#
# # microVM / Kata Containers integration:
# # Set to a registered RuntimeClass name (e.g. "kata-containers", "kata-qemu").
# # The cluster operator must install Kata Containers and register the RuntimeClass.
# # runtime_class = "kata-containers"
#
# # Storage
# storage_class = "standard"
# workspace_pvc_size = "10Gi"
#
# # Service account for agent Pods (created automatically if not set)
# # service_account = "ciab-agent"
#
# # Security (all default to true — recommended for production)
# create_network_policy = true
# run_as_non_root = true
# drop_all_capabilities = true
#
# # Resource defaults
# # default_cpu_request = "500m"
# # default_cpu_limit = "2"
# # default_memory_request = "256Mi"
# # default_memory_limit = "2Gi"
#
# # Node scheduling (for dedicated agent nodes)
# # [runtime.kubernetes.node_selector]
# # "ciab/agent-node" = "true"
#
# # Kubeconfig (omit to use in-cluster config)
# # kubeconfig = "/home/user/.kube/config"
# # context = "my-cluster"

# --- Agent Providers ---

[agents]
default_provider = "claude-code"

# Local mode: point to the binary on your PATH or give an absolute path
[agents.providers.claude-code]
enabled = true
binary = "claude"                            # for local backend
# image = "ghcr.io/shakedaskayo/ciab-claude:latest"  # for docker/opensandbox backend
default_model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[agents.providers.codex]
enabled = true
binary = "codex"
# image = "ghcr.io/shakedaskayo/ciab-codex:latest"
api_key_env = "OPENAI_API_KEY"

[agents.providers.gemini]
enabled = false
binary = "gemini"
# image = "ghcr.io/shakedaskayo/ciab-gemini:latest"
api_key_env = "GOOGLE_API_KEY"

[agents.providers.cursor]
enabled = false
binary = "cursor"
# image = "ghcr.io/shakedaskayo/ciab-cursor:latest"
api_key_env = "CURSOR_API_KEY"

# --- Credentials ---

[credentials]
backend = "sqlite"
encryption_key_env = "CIAB_ENCRYPTION_KEY"

# --- Provisioning ---

[provisioning]
timeout_secs = 300
max_script_size_bytes = 1048576

# --- Streaming ---

[streaming]
buffer_size = 500
keepalive_interval_secs = 15
max_stream_duration_secs = 3600

# --- Security ---

[security]
api_keys = []
drop_capabilities = ["NET_RAW", "SYS_ADMIN"]

# --- Logging ---

[logging]
level = "info"
format = "json"

# --- Gateway ---
# Gateway enables remote access via tunnels, LAN discovery, and scoped tokens.
# When disabled (default), CIAB works exactly as before.
#
# Supported tunnel providers: bore, cloudflare, ngrok, frp
# Switch providers via tunnel_provider or in the desktop UI settings.

# [gateway]
# enabled = true
# tunnel_provider = "bore"   # Active provider: "bore", "cloudflare", "ngrok", "frp"

# LAN discovery via mDNS/DNS-SD (advertises _ciab._tcp.local.)
# [gateway.lan]
# enabled = true
# mdns_name = "ciab"         # Advertised as ciab.local
# advertise_port = 9090

# --- Bore (https://github.com/ekzhang/bore) ---
# Simple, zero-config tunnels. Uses bore.pub by default (free).
# Auto-installs via `cargo install bore-cli` if not found on PATH.
# [gateway.bore]
# enabled = true
# binary = "bore"
# server = "bore.pub"        # Public bore relay server
# server_port = 0            # 0 = random port assigned by server
# secret = ""                # Optional shared secret for the bore server
# auto_install = true        # Download & install bore if not found

# --- Cloudflare Tunnel (cloudflared) ---
# Two modes:
#   Quick tunnel (no account needed): omit tunnel_token — gets a free *.trycloudflare.com URL
#   Named tunnel (persistent URL): set tunnel_token from Cloudflare dashboard
# [gateway.cloudflare]
# enabled = false
# binary = "cloudflared"
# tunnel_token = ""          # From: cloudflare zero trust > tunnels > your-tunnel > token
# tunnel_name = ""           # Optional: display name for the tunnel
# auto_install = true        # Download cloudflared if not found

# --- ngrok ---
# Requires a free ngrok account for authtoken. Paid plans unlock custom domains.
# [gateway.ngrok]
# enabled = false
# binary = "ngrok"
# authtoken = "${NGROK_AUTHTOKEN}"
# domain = ""                # Custom domain (paid plans only)
# region = "us"              # us, eu, ap, au, sa, jp, in
# auto_install = true        # Download ngrok if not found

# --- FRP (frp tunnels via a self-hosted frps server) ---
# [gateway.frp]
# enabled = false
# frpc_binary = "frpc"
# server_addr = "your-frps-server.example.com"
# server_port = 7000
# auth_token = "${FRP_AUTH_TOKEN}"
# subdomain_prefix = "ciab"
# tls_enable = true

# URL routing mode for per-sandbox access
# [gateway.routing]
# mode = "path"              # "path" (default) or "subdomain"
# base_domain = "example.com"

# Advanced settings (k8s, custom DNS)
# [gateway.advanced]
# custom_dns_cname = "ciab.example.com"
# k8s_ingress_class = "nginx"
# [gateway.advanced.k8s_ingress_annotations]
# "nginx.ingress.kubernetes.io/proxy-body-size" = "50m"

# --- LLM Providers ---
# LLM providers are inference backends (Anthropic API, OpenAI API, Ollama, etc.).
# They are distinct from agent providers (claude-code, codex, etc.) which are CLI runtimes.
# Providers configured here are seeded into the database on first startup.

[llm_providers]
# Auto-detect Ollama on startup (checks http://localhost:11434).
# When detected, CIAB registers it as an LLM provider and lists its pulled models.
# Use auto-detected Ollama models directly in any workspace/sandbox.
auto_detect_ollama = true

# Example: seed an Anthropic provider from environment
# [llm_providers.providers.anthropic]
# kind = "anthropic"
# api_key_env = "ANTHROPIC_API_KEY"
# default_model = "claude-sonnet-4-20250514"

# Example: seed an OpenAI provider
# [llm_providers.providers.openai]
# kind = "openai"
# api_key_env = "OPENAI_API_KEY"
# default_model = "gpt-4o"

# Example: OpenRouter (use with any agent via base URL override)
# [llm_providers.providers.openrouter]
# kind = "openrouter"
# api_key_env = "OPENROUTER_API_KEY"
# base_url = "https://openrouter.ai/api/v1"

# Example: Local Ollama (explicit — or let auto_detect_ollama do this automatically)
# Ollama's Anthropic-compatible API is used by claude-code:
#   - claude-code  →  ANTHROPIC_BASE_URL=http://localhost:11434 (no /v1 suffix)
#                     ANTHROPIC_AUTH_TOKEN=ollama, ANTHROPIC_API_KEY=""
#   - codex        →  OPENAI_BASE_URL=http://localhost:11434/v1
# Pull models with: ollama pull llama3.1  or via the desktop UI (Settings → LLM Providers)
# [llm_providers.providers.ollama-local]
# kind = "ollama"
# base_url = "http://localhost:11434"
# default_model = "llama3.1"

# --- OAuth ---

# [oauth.providers.github]
# client_id = "${GITHUB_CLIENT_ID}"
# client_secret_env = "GITHUB_CLIENT_SECRET"
# auth_url = "https://github.com/login/oauth/authorize"
# token_url = "https://github.com/login/oauth/access_token"
# scopes = ["repo", "read:org"]
# redirect_uri = "http://localhost:8080/api/v1/oauth/github/callback"

# --- Channels ---
# Channels enable external messaging platform integration (WhatsApp, Slack, webhooks).
# When disabled (default), channel API endpoints still work for CRUD but adapters won't start.

# [channels]
# enabled = false
# reaper_interval_secs = 60   # How often to check for expired auto-provisioned sandboxes

# [channels.whatsapp]
# enabled = false
# session_dir = "/tmp/ciab-whatsapp-sessions"

# [channels.slack]
# enabled = false

# [channels.webhook]
# enabled = true
