apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ciab.fullname" . }}-config
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = {{ .Values.service.port }}

    [runtime]
    backend = {{ .Values.runtime.backend | quote }}

    [runtime.kubernetes]
    namespace = {{ .Values.runtime.kubernetes.namespace | quote }}
    agent_image = {{ .Values.runtime.kubernetes.agentImage | quote }}
    {{- if .Values.runtime.kubernetes.runtimeClass }}
    runtime_class = {{ .Values.runtime.kubernetes.runtimeClass | quote }}
    {{- end }}
    storage_class = {{ .Values.runtime.kubernetes.storageClass | quote }}
    workspace_pvc_size = {{ .Values.runtime.kubernetes.workspacePvcSize | quote }}
    create_network_policy = {{ .Values.runtime.kubernetes.createNetworkPolicy }}
    run_as_non_root = {{ .Values.runtime.kubernetes.runAsNonRoot }}
    drop_all_capabilities = {{ .Values.runtime.kubernetes.dropAllCapabilities }}
    {{- if .Values.runtime.kubernetes.defaultCpuRequest }}
    default_cpu_request = {{ .Values.runtime.kubernetes.defaultCpuRequest | quote }}
    {{- end }}
    {{- if .Values.runtime.kubernetes.defaultCpuLimit }}
    default_cpu_limit = {{ .Values.runtime.kubernetes.defaultCpuLimit | quote }}
    {{- end }}
    {{- if .Values.runtime.kubernetes.defaultMemoryRequest }}
    default_memory_request = {{ .Values.runtime.kubernetes.defaultMemoryRequest | quote }}
    {{- end }}
    {{- if .Values.runtime.kubernetes.defaultMemoryLimit }}
    default_memory_limit = {{ .Values.runtime.kubernetes.defaultMemoryLimit | quote }}
    {{- end }}

    [agents]
    default_provider = {{ .Values.agents.defaultProvider | quote }}

    {{- range $name, $cfg := .Values.agents.providers }}
    [agents.providers.{{ $name }}]
    enabled = {{ $cfg.enabled }}
    image = {{ $cfg.image | quote }}
    {{- end }}

    [credentials]
    backend = "sqlite"
    encryption_key_env = "CIAB_ENCRYPTION_KEY"

    [security]
    {{- if .Values.security.apiKeys }}
    api_keys = [{{ range .Values.security.apiKeys }}{{ . | quote }}, {{ end }}]
    {{- end }}

    [gateway]
    enabled = {{ .Values.gateway.enabled }}
    tunnel_provider = {{ .Values.gateway.tunnelProvider | quote }}
