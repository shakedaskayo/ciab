{{- if .Values.runtime.kubernetes.namespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ciab-agent
  namespace: {{ .Values.runtime.kubernetes.namespace }}
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
    ciab/managed-by: ciab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ciab-agent
subjects:
  - kind: ServiceAccount
    name: ciab-agent
    namespace: {{ .Values.runtime.kubernetes.namespace }}
{{- end }}
