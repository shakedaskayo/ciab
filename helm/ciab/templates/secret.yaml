{{- if or .Values.secrets.encryptionKey .Values.secrets.anthropicApiKey .Values.secrets.openaiApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ciab.fullname" . }}-secrets
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.encryptionKey }}
  CIAB_ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
{{- end }}
