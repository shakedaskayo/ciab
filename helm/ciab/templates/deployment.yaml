apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ciab.fullname" . }}
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ciab.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ciab.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ciab.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ciab
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
            - start
            - --config
            - /etc/ciab/config.toml
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- if .Values.secrets.encryptionKey }}
            - name: CIAB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ciab.fullname" . }}-secrets
                  key: CIAB_ENCRYPTION_KEY
            {{- end }}
            {{- if .Values.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ciab.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if .Values.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ciab.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            - name: CIAB_DATABASE_URL
              value: sqlite:///data/ciab.db
          volumeMounts:
            - name: config
              mountPath: /etc/ciab
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: {{ include "ciab.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ciab.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
