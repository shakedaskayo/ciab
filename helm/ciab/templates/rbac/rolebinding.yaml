apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ciab.fullname" . }}-server
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ciab.fullname" . }}-server
subjects:
  - kind: ServiceAccount
    name: {{ include "ciab.fullname" . }}
    namespace: {{ .Release.Namespace }}
