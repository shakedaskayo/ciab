apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ciab.fullname" . }}-server
  labels:
    {{- include "ciab.labels" . | nindent 4 }}
rules:
  # Manage agent Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Manage workspace PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  # Manage NetworkPolicies for agent isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list"]
  # Create agent RBAC (service accounts, roles, role bindings)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "get"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "get"]
